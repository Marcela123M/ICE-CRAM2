<!DOCTYPE html>
<html lang="es">

<head>
  <title>Gráfica de Helados Tarjeta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/CSS_Grafica.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
  <div class="background">
    <div class="box">
      <h2>Unidades Vendidas por helado (Tarjeta)</h2>
      <canvas id="unidadesChart" width="400" height="200"></canvas>
      <h2>Precio Total por Helado (Tarjeta)</h2>
      <canvas id="heladosChart" width="400" height="200"></canvas>

      <div class="modal-footer">
        <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
      </div>
    </div>
  </div>

  <script>
    fetch('/heladosVendidosTarjeta')
      .then(response => response.json())
      .then(helados => {
        const agrupados = {};

        helados.forEach(h => {
          if (!agrupados[h.nombre]) {
            agrupados[h.nombre] = { unidades: 0, precioTotal: 0 };
          }
          agrupados[h.nombre].unidades += h.unidades;
          agrupados[h.nombre].precioTotal += h.precio * h.unidades;
        });

        const labels = Object.keys(agrupados);
        const unidades = labels.map(nombre => agrupados[nombre].unidades);
        const precios = labels.map(nombre => agrupados[nombre].precioTotal);

        // Gráfica de Precios
        const ctxPrecios = document.getElementById('heladosChart').getContext('2d');
        const heladosChart = new Chart(ctxPrecios, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Precios de Helados',
              data: precios,
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              borderColor: 'rgba(75, 192, 192, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });

        // Gráfica de Unidades
        const ctxUnidades = document.getElementById('unidadesChart').getContext('2d');
        const unidadesChart = new Chart(ctxUnidades, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Unidades de Helados',
              data: unidades,
              backgroundColor: 'rgba(153, 102, 255, 0.2)',
              borderColor: 'rgba(153, 102, 255, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      })
      .catch(error => console.error('Error al cargar los helados:', error));
  </script>
</body>

</html>
