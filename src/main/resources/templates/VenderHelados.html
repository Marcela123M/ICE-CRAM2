<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Vender Helados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_VenderHelados.css">
</head>

<body>
    <div class="content-area">
        <div class="content-header text-center">
            <img src="/img/heladoCool.png" alt="Marca Helado" class="logo-img me-2">
            <img src="/img/titulo.png" alt="Título Heladería" class="titulo-img">
        </div>

        <form id="ventaForm" action="/venderHelados" method="post" class="form-venta">
            <h2 class="mb-4 text-gradient">Vender Helados</h2>
            <div th:if="${mensaje}" class="alert alert-success mt-2" role="alert">
                <span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger mt-2" role="alert">
                <span th:text="${error}"></span>
            </div>

            <div class="mb-3">
                <label for="tipoFiltro" class="form-label">Filtrar por tipo:</label>
                <select id="tipoFiltro" class="form-select" onchange="filtrarPorTipo()">
                    <option value="todos">Todos</option>
                    <option value="cono">Cono</option>
                    <option value="paleta">Paleta</option>
                    <option value="vaso">Vaso</option>
                    <option value="galleta">Galleta</option>
                </select>
            </div>

            <div id="errorGlobal" class="alert alert-danger d-none"></div>

            <h4 class="mt-4">Helados Disponibles</h4>
            <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3 mb-4" id="galeriaHelados">
                <th:block th:each="helado : ${helados}">
                    <div class="col helado-col" th:data-tipo="${helado.tipo}">
                        <div class="card helado-card" th:data-nombre="${helado.nombre}"
                            th:data-unidades="${helado.unidades}" th:data-precio="${helado.precio}"
                            th:data-tipo-helado="${helado.tipo}" onclick="prepararParaAgregar(this)"
                            style="cursor: pointer;">
                            <img th:src="@{'/img/' + ${helado.tipo} + '.png'}"
                                onerror="this.onerror=null; this.src='/img/default.png';"
                                class="card-img-top helado-img" alt="helado">
                            <div class="card-body text-center">
                                <h6 class="card-title mb-1" th:text="${helado.nombre}">Sabor</h6>
                                <p class="card-text small mb-0" th:text="'$' + ${helado.precio}"></p>
                                <p class="card-text small" th:text="'Disp: ' + ${helado.unidades}"></p>
                            </div>

                        </div>
                    </div>
                </th:block>
            </div>

            <div class="row align-items-end mb-3">
                <div class="col-md-6">
                    <label for="heladoSeleccionadoNombre" class="form-label">Helado seleccionado:</label>
                    <input id="heladoSeleccionadoNombre" class="form-control" type="text" disabled readonly
                        placeholder="Seleccione un helado">
                </div>
                <div class="col-md-3">
                    <label for="unidadesParaAgregar" class="form-label">Cantidad:</label>
                    <input id="unidadesParaAgregar" name="unidadesParaAgregar" class="form-control" type="number"
                        value="1" min="1">
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-success w-100" onclick="confirmarAgregarAlCarrito()">Añadir al
                        Carrito</button>
                </div>
            </div>

            <div id="errorCarrito" class="alert alert-warning d-none"></div>

            <div class="mt-4">
                <h4>Carrito de Compra</h4>
                <ul id="listaCarrito" class="list-group mb-3">
                    <li class="list-group-item">El carrito está vacío.</li>
                </ul>
            </div>

            <fieldset class="p-4 rounded border border-primary mt-4">
                <legend class="text-primary fw-bold">Datos del Cliente</legend>
                <div id="mensajeBusquedaCliente" class="alert d-none mt-2"></div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cedula" class="form-label">Cédula:</label>
                        <div class="input-group">
                            <input id="cedula" name="cedula" class="form-control" type="text" required>
                            <button type="button" class="btn btn-outline-primary"
                                onclick="buscarCliente()">Buscar</button>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="nombreCliente" class="form-label">Nombre Cliente:</label>
                        <input id="nombreCliente" name="nombreCliente" class="form-control" type="text" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input id="fechaNacimiento" name="fechaNacimiento" class="form-control" type="date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefono" class="form-label">Teléfono:</label>
                        <input id="telefono" name="telefono" class="form-control" type="text">
                    </div>
                </div>
            </fieldset>

            <div class="row mt-4">
                <div class="col-md-6">
                    <label for="metodoPago" class="form-label">Método de Pago:</label>
                    <select id="metodoPago" name="metodoPago" class="form-select">
                        <option value="efectivo">Efectivo</option>
                        <option value="tarjeta">Tarjeta</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="totalAPagarDisplay" class="form-label">Total a Pagar:</label>
                    <input id="totalAPagarDisplay" class="form-control fw-bold" type="text" value="0.00 pesos" disabled
                        readonly>
                    <input type="hidden" id="totalAPagar" name="totalAPagar" value="0.00">
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 gap-2">
                <button onclick="window.location.href='/logout'" type="button" class="btn btn-outline-secondary">Cerrar
                    Sesión</button>
                <button type="submit" class="btn btn-primary">Vender</button>
            </div>
            <div id="carritoCamposOcultos"></div>
        </form>
    </div>

    <script th:inline="javascript">
        let carrito = [];
        let heladoTemporalParaAgregar = null;

        // Selecciona un helado al hacer clic en la tarjeta
        function prepararParaAgregar(cardElement) {
            const nombre = cardElement.getAttribute('data-nombre');
            const unidadesDisponibles = parseInt(cardElement.getAttribute('data-unidades'));
            const precio = parseFloat(cardElement.getAttribute('data-precio'));
            const tipo = cardElement.getAttribute('data-tipo-helado');

            document.getElementById('heladoSeleccionadoNombre').value = `${nombre} (Disp: ${unidadesDisponibles})`;
            document.getElementById('unidadesParaAgregar').value = "1";
            document.getElementById('unidadesParaAgregar').max = unidadesDisponibles;

            heladoTemporalParaAgregar = { nombre, unidadesDisponibles, precio, tipo };

            // Quitar selección previa y aplicar visual a la actual
            document.querySelectorAll('.helado-card.border-primary').forEach(c => c.classList.remove('border-primary', 'border-3'));
            cardElement.classList.add('border-primary', 'border-3', 'pulse');

            setTimeout(() => {
                cardElement.classList.remove('pulse');
            }, 300);
        }

        function confirmarAgregarAlCarrito() {
            if (!heladoTemporalParaAgregar) {
                mostrarError('errorCarrito', "Primero selecciona un helado de la lista haciendo clic.");
                return;
            }

            const cantidad = parseInt(document.getElementById('unidadesParaAgregar').value);
            const { nombre, unidadesDisponibles, precio, tipo } = heladoTemporalParaAgregar;

            if (isNaN(cantidad) || cantidad <= 0) {
                mostrarError('errorCarrito', "Por favor, ingresa una cantidad válida.");
                return;
            }

            const itemExistente = carrito.find(item => item.nombre === nombre);
            const cantidadEnCarrito = itemExistente ? itemExistente.cantidad : 0;

            if (cantidad + cantidadEnCarrito > unidadesDisponibles) {
                mostrarError('errorCarrito', `Stock insuficiente para ${nombre}. Ya tienes ${cantidadEnCarrito}, disponibles ${unidadesDisponibles}.`);
                return;
            }

            if (itemExistente) {
                itemExistente.cantidad += cantidad;
            } else {
                carrito.push({ nombre, cantidad, precio, unidadesDisponiblesOriginal: unidadesDisponibles, tipo });
            }

            renderizarCarrito();
            actualizarTotalAPagarGeneral();

            // Reset
            document.getElementById('heladoSeleccionadoNombre').value = "";
            document.getElementById('unidadesParaAgregar').value = "1";
            document.querySelectorAll('.helado-card.border-primary').forEach(c => c.classList.remove('border-primary', 'border-3'));
            heladoTemporalParaAgregar = null;
        }

        function renderizarCarrito() {
            const lista = document.getElementById('listaCarrito');
            lista.innerHTML = '';

            if (carrito.length === 0) {
                lista.innerHTML = '<li class="list-group-item">El carrito está vacío.</li>';
            } else {
                carrito.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `
                        <div class="d-flex align-items-center">
                            <img src="/img/${item.tipo}.png" onerror="this.onerror=null; this.src='/img/default.png';" alt="${item.nombre}">
                            <div>
                                <strong>${item.nombre}</strong><br>
                                <small>$${item.precio.toFixed(2)} c/u</small>
                            </div>
                        </div>

                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-secondary" onclick="ajustarCantidad(${index}, -1)">-</button>
                            <input type="number" class="form-control form-control-sm mx-1 cantidad-input-carrito" value="${item.cantidad}" min="1" max="${item.unidadesDisponiblesOriginal}" onchange="actualizarCantidadInput(${index}, this.value)">
                            <button class="btn btn-sm btn-outline-secondary" onclick="ajustarCantidad(${index}, 1)">+</button>
                            <button class="btn btn-sm btn-danger ms-2" onclick="eliminarDelCarrito(${index})">&times;</button>
                        </div>

                        <div>
                            <strong>$${(item.precio * item.cantidad).toFixed(2)}</strong>
                        </div>`;
                    lista.appendChild(li);
                });
            }

            actualizarTotalAPagarGeneral();
        }

        function actualizarCantidadInput(index, nuevaCantidadStr) {
            const item = carrito[index];
            const nuevaCantidad = parseInt(nuevaCantidadStr);

            if (!item || isNaN(nuevaCantidad) || nuevaCantidad < 1 || nuevaCantidad > item.unidadesDisponiblesOriginal) {
                mostrarError('errorCarrito', `Cantidad no válida para ${item.nombre}.`);
                renderizarCarrito();
                return;
            }

            item.cantidad = nuevaCantidad;
            renderizarCarrito();
        }

        function ajustarCantidad(index, delta) {
            const item = carrito[index];
            if (!item) return;
            const nuevaCantidad = item.cantidad + delta;
            if (nuevaCantidad <= 0) eliminarDelCarrito(index);
            else if (nuevaCantidad > item.unidadesDisponiblesOriginal) {
                mostrarError('errorCarrito', `Solo hay ${item.unidadesDisponiblesOriginal} disponibles de ${item.nombre}.`);
            } else {
                item.cantidad = nuevaCantidad;
            }
            renderizarCarrito();
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            renderizarCarrito();
        }

        function actualizarTotalAPagarGeneral() {
            let total = carrito.reduce((sum, item) => sum + item.precio * item.cantidad, 0);
            const metodoPago = document.getElementById('metodoPago').value;

            if (metodoPago === "tarjeta" && total > 0) {
                total += total * 0.03;
            }

            document.getElementById('totalAPagarDisplay').value = `${total.toFixed(2)} pesos`;
            document.getElementById('totalAPagar').value = total.toFixed(2);
        }

        function mostrarError(id, mensaje) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = mensaje;
                el.style.display = "block";
                setTimeout(() => { el.style.display = "none"; }, 4000);
            }
        }

        function buscarCliente() {
            const cedula = document.getElementById("cedula").value;
            if (!cedula) {
                mostrarMensajeBusqueda("Ingrese una cédula.", "warning");
                return;
            }

            fetch(`/buscarCliente?cedula=${encodeURIComponent(cedula)}`)
                .then(res => {
                    if (!res.ok) throw new Error("Cliente no encontrado");
                    return res.json();
                })
                .then(cliente => {
                    document.getElementById("nombreCliente").value = cliente.nombre;
                    document.getElementById("fechaNacimiento").value = cliente.fechaNacimiento;
                    document.getElementById("telefono").value = cliente.telefono || "";
                    mostrarMensajeBusqueda("Cliente encontrado.", "success");
                })
                .catch(err => {
                    document.getElementById("nombreCliente").value = "";
                    document.getElementById("fechaNacimiento").value = "";
                    document.getElementById("telefono").value = "";
                    mostrarMensajeBusqueda(err.message, "danger");
                });
        }

        function mostrarMensajeBusqueda(mensaje, tipo) {
            const msg = document.getElementById("mensajeBusquedaCliente");
            msg.className = `alert alert-${tipo} mt-2`;
            msg.textContent = mensaje;
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        }

        function filtrarPorTipo() {
            const tipo = document.getElementById('tipoFiltro').value;
            document.querySelectorAll('.helado-col').forEach(col => {
                const tipoHelado = col.getAttribute('data-tipo');
                col.style.display = (tipo === "todos" || tipo === tipoHelado) ? "block" : "none";
            });
        }

        // Inicialización
        document.addEventListener("DOMContentLoaded", function () {
            renderizarCarrito();
            document.getElementById('metodoPago').addEventListener('change', actualizarTotalAPagarGeneral);

            // Hacer clickeables las tarjetas
            document.querySelectorAll('.helado-card').forEach(card => {
                card.addEventListener('click', () => prepararParaAgregar(card));
            });

            // Alertas Thymeleaf automáticas
            document.querySelectorAll(".alert-success, .alert-danger").forEach(alert => {
                if (alert.textContent.trim() !== "" && !alert.id) {
                    setTimeout(() => { alert.style.display = "none"; }, 5000);
                }
            });

            // Validación antes de enviar el formulario
            document.getElementById("ventaForm").addEventListener("submit", function (e) {
                if (carrito.length === 0) {
                    e.preventDefault();
                    mostrarError('errorCarrito', "Agrega al menos un helado al carrito.");
                    return;
                }

                // Limpia los campos ocultos previos
                const divCampos = document.getElementById("carritoCamposOcultos");
                divCampos.innerHTML = "";

                // Crea los inputs ocultos con la información del carrito
                carrito.forEach((item, index) => {
                    const inputNombre = document.createElement("input");
                    inputNombre.type = "hidden";
                    inputNombre.name = "nombresHelados";
                    inputNombre.value = item.nombre;
                    divCampos.appendChild(inputNombre);

                    const inputCantidad = document.createElement("input");
                    inputCantidad.type = "hidden";
                    inputCantidad.name = "unidadesVenderLista";
                    inputCantidad.value = item.cantidad;
                    divCampos.appendChild(inputCantidad);
                });
            });

        });
    </script>

</body>

</html>
