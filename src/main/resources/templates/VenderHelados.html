<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vender Helado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_EditarHelado.css">
</head>
<body>
<div class="background">
    <div class="box">
        <form action="/venderHelados" method="post">
            <h2>Vender Helados</h2>
            <div class="modal-body">

                <select name="nombreHelado" class="form-select form-select-lg mb-3" aria-label="Large select example" onchange="actualizarUnidadesDisponibles()">
                    <option selected>Elija un Helado</option>
                    <th:block th:each="helado : ${helados}">
                        <option th:value="${helado.nombre}" th:text="${helado.nombre}" th:attr="data-unidades=${helado.unidades}"></option>
                    </th:block>
                </select>

                <label>Unidades Disponibles:</label>
                <input id="unidadesDisponibles" name="unidadesDisponibles" class="form-control" type="text" value=""
                       aria-label="Disabled input example" disabled readonly>

                <label class="form-label">Unidades a Vender:</label>
                <input name="unidadesVender" class="form-control form-control-lg" type="number"
                       aria-label=".form-control-lg example" required><br>
                
                <select name="metodoPago" class="form-select form-select-lg mb-3" aria-label="Large select example">
                    <option selected>Formas De Pago</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="tarjeta">Tarjeta</option>
                </select>
            </div>
            <div class="modal-footer">
                <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
                <button type="submit" class="btn btn-primary">Vender</button>
            </div>
        </form>
    </div>
</div>
<script>
    function actualizarUnidadesDisponibles() {
        const select = document.querySelector('select[name="nombreHelado"]');
        const unidadesDisponibles = select.options[select.selectedIndex].getAttribute('data-unidades');
        document.getElementById('unidadesDisponibles').value = unidadesDisponibles;
    }
</script>
</body>
</html>
