<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mover a Heladeria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_MoverAheladeria.css">
</head>
<body onload="actualizarUnidadesDisponibles()">
<div class="background">
    <div class="box">
        <form action="/moverHelado" method="post">
            <h2>Mover Helado a Heladeria</h2><br>

            <select id="heladoSelect" name="nombreHelado" class="form-select form-select-lg mb-3" aria-label="Large select example" onchange="actualizarUnidadesDisponibles()" required>
                <option value="" selected>Elija un Helado</option>
                <!-- Itera sobre la lista de helados -->
                <th:block th:each="helado : ${helados}">
                    <option th:value="${helado.nombre}" th:text="${helado.nombre}" th:attr="data-unidades=${helado.unidades}"></option>
                </th:block>
            </select>

            <label>Unidades Disponibles:</label>
            <input id="unidadesDisponibles" name="unidadesDisponibles" class="form-control" type="text" value=""
                   aria-label="Disabled input example" disabled readonly>

            <label class="form-label">Unidades a mover:</label>
            <input id="unidadesMover" class="form-control form-control-lg" name="unidadesMover" type="number" min="1" aria-label=".form-control-lg example" required>

            <div class="modal-footer">
                <div id="error" th:if="${error}" class="alert alert-danger" role="alert">
                    <p th:text="${error}"></p>
                </div>
                <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    function actualizarUnidadesDisponibles() {
        var select = document.getElementById('heladoSelect');
        var unidadesDisponibles = select.options[select.selectedIndex].getAttribute('data-unidades');

        document.getElementById('unidadesDisponibles').value = unidadesDisponibles;
        document.getElementById('unidadesMover').setAttribute('max', unidadesDisponibles);
    }
</script>
</body>
</html>
