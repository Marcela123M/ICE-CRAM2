<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mover Helado a Heladeria</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/styleHome.css">
  <link rel="stylesheet" href="/css/CSS_MoverAheladeria.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body onload="actualizarUnidadesDisponibles()">
  <div class="main-container">
    <div class="sidebar">
      <div th:replace="sidebar :: sidebar"></div>
    </div>

    <div class="content-area">
      <div class="content-header">
        <h1>Mover Helado a Heladeria</h1>
        <p>Selecciona el helado que deseas transferir del almacen al mostrador</p>
      </div>

      <div th:if="${mensaje}" class="alert alert-primary alert-dismissible fade show mt-3" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
      </div>

      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
      </div>


      <div class="form-container">
        <form action="/moverHelado" method="post" class="move-form shadow-lg">
          <div class="mb-3">
            <label for="heladoSelect" class="form-label">Helado</label>

            <select id="heladoSelect" name="nombreHelado" class="form-select" onchange="actualizarUnidadesDisponibles()"
              required>
              <option value="">Elija un Helado</option>
              <th:block th:each="helado : ${helados}">
                <option th:value="${helado.nombre}" th:text="${helado.nombre}" th:attr="data-unidades=${helado.unidades}, 
                                 data-tipo=${helado.tipo},
                                 data-heladeria=${stockHeladeriaMap.getOrDefault(helado.nombre, 0)}">
                </option>
              </th:block>
            </select>
          </div>

          <div class="mb-3">
            <label for="unidadesMover" class="form-label">Unidades a Mover</label>
            <input id="unidadesMover" name="unidadesMover" class="form-control" type="number" min="1" required>
            <div class="form-text">No puedes mover más unidades de las que hay en el almacén.</div>
          </div>

          <div class="buttons mt-4">
            <button type="submit" class="btn btn-primary">Guardar Transferencia</button>
          </div>
        </form>

        <div class="info-card shadow-lg">
          <div class="info-text">
            <h4>Información del Helado</h4>

            <div class="info-item">
              <span class="label">Tipo:</span>
              <span id="tipo" class="value">—</span>
            </div>

            <div class="info-item">
              <span class="label">Disponible Almacén:</span>
              <span id="unidadesDisponibles" class="value">—</span>
            </div>

            <div class="info-item">
              <span class="label">Actual en Heladería:</span>
              <span id="unidadesHeladeria" class="value text-success fw-bold">—</span>
            </div>

          </div>
          <div class="illustration">
            <img src="/img/heladoCool.png" alt="Helado">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    function actualizarUnidadesDisponibles() {
      var select = document.getElementById('heladoSelect');

      // Si no hay nada seleccionado (indice -1 o valor vacio)
      if (select.selectedIndex < 1) {
        document.getElementById('tipo').textContent = '—';
        document.getElementById('unidadesDisponibles').textContent = '—';
        document.getElementById('unidadesHeladeria').textContent = '—';
        document.getElementById('unidadesMover').removeAttribute('max');
        return;
      }

      var selected = select.options[select.selectedIndex];

      // Leemos los atributos data-
      var unidadesAlmacen = selected.getAttribute('data-unidades');
      var tipo = selected.getAttribute('data-tipo');
      var stockEnHeladeria = selected.getAttribute('data-heladeria');

      // Actualizamos el texto en la tarjeta
      document.getElementById('tipo').textContent = tipo || '—';
      document.getElementById('unidadesDisponibles').textContent = unidadesAlmacen || '0';
      document.getElementById('unidadesHeladeria').textContent = stockEnHeladeria !== null ? stockEnHeladeria : '0';

      // Validamos el input maximo segun lo que hay en almacen
      if (unidadesAlmacen) {
        document.getElementById('unidadesMover').setAttribute('max', unidadesAlmacen);
      }
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const links = document.querySelectorAll('.menu-item[href]');
      const currentUrl = window.location.pathname;

      links.forEach(link => {
        if (link.getAttribute('href') === currentUrl) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    });
  </script>

  <script>
    setTimeout(function () {
      const alertList = document.querySelectorAll('.alert');
      alertList.forEach(function (alert) {
        let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
        bsAlert.close();
      });
    }, 5000); // 5 segundos
  </script>

</body>

</html>
