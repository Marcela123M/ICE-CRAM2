<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lista de Helados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_ListaHelados.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <!-- Contenido principal -->
        <div class="content-area">
            <div class="modal-footer">
                <button onclick="window.location.href='/reporteOpciones'" type="button"
                    class="btn btn-secondary">Regresar</button>
            </div>
            <h1>Lista de Helados Disponibles</h1>

            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Sabor</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Unidades</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Iteramos sobre la lista de helados -->
                    <tr th:each="helado : ${helados}">
                        <td th:text="${helado.nombre}">Nombre del Helado</td>
                        <td th:text="${helado.sabor}">Sabor del Helado</td>
                        <td th:text="${helado.tipo}">Tipo de Helado</td>
                        <td th:text="${helado.precio}">Precio del Helado</td>
                        <td th:text="${helado.unidades}">Unidades del Helado</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentUrl = window.location.pathname;
            const linkMappings = {
                '/reporteOpciones': [
                    '/reporteOpciones',
                    '/heladosAlmacen',
                    '/heladosHeladeria',
                    '/registroVentas',
                    '/reporte'
                ],
                '/home': ['/home'],
                '/agregarAlAlmacen': ['/agregarAlAlmacen'],
                '/moverHelado': ['/moverHelado'],
                '/editarHelado': ['/editarHelado'],
                '/eliminarHelado': ['/eliminarHelado'],
            };

            const links = document.querySelectorAll('.menu-item[href]');

            links.forEach(link => {
                const href = link.getAttribute('href');
                const validPaths = linkMappings[href] || [];

                if (validPaths.some(path => currentUrl.startsWith(path))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>


</body>

</html>
