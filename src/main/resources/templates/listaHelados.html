<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Helados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_EditarHelado.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="background">
    <div class="box">
        <h1>Lista de Helados Disponibles</h1>

        <table class="table table-bordered">
            <thead class="table-light">
            <tr>
                <th>Nombre</th>
                <th>Sabor</th>
                <th>Precio</th>
                <th>Unidades</th>
            </tr>
            </thead>
            <tbody>
            <!-- Iteramos sobre la lista de helados -->
            <tr th:each="helado : ${helados}">
                <td th:text="${helado.nombre}">Nombre del Helado</td>
                <td th:text="${helado.sabor}">Sabor del Helado</td>
                <td th:text="${helado.precio}">Precio del Helado</td>
                <td th:text="${helado.unidades}">Unidades del Helado</td>
            </tr>
            </tbody>
        </table>
        <div class="modal-footer">
            <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
        </div>
    </div>
</div>

</body>
</html>
