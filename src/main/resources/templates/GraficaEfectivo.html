<!DOCTYPE html>
<html lang="es">

<head>
  <title>Gráfica de Helados Efectivo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/CSS_Grafica.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
  <div class="background">
    <div class="box">
      <div id="contenidoPDF">
        <h2>Unidades Vendidas por helado (Efectivo)</h2>
        <canvas id="unidadesChart" width="400" height="200"></canvas>
        <h2>Precio Total por Helado (Efectivo)</h2>
        <canvas id="heladosChart" width="400" height="200"></canvas>
      </div>

      <div class="modal-footer">
        <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
        <button onclick="generarPDF()" type="button" class="btn btn-success">Descargar PDF</button>
      </div>
    </div>
  </div>

  <script>
    fetch('/heladosVendidosEfectivo')
      .then(response => response.json())
      .then(helados => {
        const agrupados = {};

        helados.forEach(h => {
          if (!agrupados[h.nombre]) {
            agrupados[h.nombre] = { unidades: 0, precioTotal: 0 };
          }
          agrupados[h.nombre].unidades += h.unidades;
          agrupados[h.nombre].precioTotal += h.precio * h.unidades;
        });

        const labels = Object.keys(agrupados);
        const unidades = labels.map(nombre => agrupados[nombre].unidades);
        const precios = labels.map(nombre => agrupados[nombre].precioTotal);

        // Gráfica de Precios
        const ctxPrecios = document.getElementById('heladosChart').getContext('2d');
        const heladosChart = new Chart(ctxPrecios, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Precios de Helados',
              data: precios,
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              borderColor: 'rgba(75, 192, 192, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });

        // Gráfica de Unidades
        const ctxUnidades = document.getElementById('unidadesChart').getContext('2d');
        const unidadesChart = new Chart(ctxUnidades, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Unidades de Helados',
              data: unidades,
              backgroundColor: 'rgba(153, 102, 255, 0.2)',
              borderColor: 'rgba(153, 102, 255, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      })
      .catch(error => console.error('Error al cargar los helados:', error));

    async function generarPDF() {
      const { jsPDF } = window.jspdf;

      const elemento = document.getElementById("contenidoPDF");

      // esperamos para rendderizar todo
      await new Promise(resolve => setTimeout(resolve, 500));

      html2canvas(elemento, { scale: 2, useCORS: true }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        const margin = 10; // margen en mm
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        const imgProps = pdf.getImageProperties(imgData);
        const imgWidth = pageWidth - 2 * margin;
        const imgHeight = (imgProps.height * imgWidth) / imgProps.width;

        // fecha
        const fecha = new Date().toLocaleDateString();
        pdf.setFontSize(12);
        pdf.text(`Fecha: ${fecha}`, pageWidth - margin, margin - 2, { align: 'right' });

        // Agregamos la imagen con margen
        pdf.addImage(imgData, 'PNG', margin, margin, imgWidth, imgHeight);

        pdf.save("graficas_helados.pdf");
      });
    }
  </script>
</body>

</html>
