<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Helado al Almacén</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_AgregarAlAlmacen.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <!-- Contenido principal -->
        <div class="content-area">
            <div class="content-header">
                <h1>Agregar Helado al Almacén</h1>
                <p>Registra nuevos helados en el inventario interno</p>
            </div>
            <!-- Mensaje de Éxito -->
            <div th:if="${mensaje}" class="alert alert-primary alert-dismissible fade show mt-3" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- Mensaje de Error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
            <div class="form-container">
                <!-- Formulario -->
                <form action="/agregarAlAlmacen" method="POST" class="add-form shadow-lg">
                    <div class="mb-3">
                        <label class="form-label" for="nombre">Nombre del Helado</label>
                        <input class="form-control" type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="sabor">Sabor</label>
                        <input class="form-control" type="text" id="sabor" name="sabor" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="tipo">Tipo</label>
                        <input class="form-control" type="text" id="tipo" name="tipo" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="precio">Precio</label>
                        <input class="form-control" type="number" id="precio" name="precio" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="unidades">Unidades</label>
                        <input class="form-control" type="number" id="unidades" name="unidades" min="1" required>
                    </div>

                    <div class="buttons mt-4">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>

                <!-- Tarjeta decorativa / informativa -->
                <div class="info-card shadow-lg">
                    <h4>Estado del Almacén</h4>
                    <p><strong>Total de helados:</strong> <span th:text="${totalHelados}">0</span></p>
                    <p><strong>Total de unidades:</strong> <span th:text="${totalUnidades}">0</span></p>
                    <div class="illustration mt-3">
                        <img src="/img/heladoCool.png" alt="Agregar Helado">
                    </div>
                    <p>Donde la administración <br> se derrite en eficiencia</p>
                </div>

            </div>

        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll('.menu-item[href]');
            const currentUrl = window.location.pathname;

            links.forEach(link => {
                if (link.getAttribute('href') === currentUrl) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>
    <script>
        // Espera 5 segundos y cierra las alertas si están visibles
        setTimeout(function () {
            const alertList = document.querySelectorAll('.alert');
            alertList.forEach(function (alert) {
                let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>

</html>
