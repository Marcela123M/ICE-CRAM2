<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Helado al Almacen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_AgregarAlAlmacen.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <!-- Contenido principal -->
        <div class="content-area">
            <div class="content-header">
                <h1>Agregar Helado al Almacen</h1>
                <p>Registra nuevos helados en el inventario interno</p>
            </div>
            <!-- Mensaje de exito -->
            <div th:if="${mensaje}" class="alert alert-primary alert-dismissible fade show mt-3" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- Mensaje de Error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
            <div class="form-container">

                <div class="card shadow-sm mb-4 border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Reposición Rápida</h5>
                    </div>
                    <div class="card-body">
                        <form action="/sumarStockRapido" method="POST" class="row g-3 align-items-end">
                            <div class="col-md-7">
                                <label class="form-label" for="nombreHelado">Seleccionar Helado Existente</label>
                                <select class="form-select" id="nombreHelado" name="nombreHelado" required>
                                    <option value="" selected disabled>Elige un helado...</option>
                                    <option th:each="h : ${listaHelados}" th:value="${h.nombre}"
                                        th:text="${h.nombre} + ' - ' + ${h.sabor} + ' (Stock actual: ' + ${h.unidades} + ')'">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" for="cantidad">Cantidad a sumar</label>
                                <input class="form-control" type="number" id="cantidad" name="cantidad" min="1"
                                    placeholder="+10" required>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100">Sumar</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-lg">
                    <div class="card-header">
                        <h5 class="mb-0">Registrar Nuevo Producto</h5>
                    </div>
                    <div class="card-body">
                        <form action="/agregarAlAlmacen" method="POST" class="add-form">
                            <div class="mb-3">
                                <label class="form-label" for="nombre">Nombre del Helado</label>
                                <input class="form-control" type="text" id="nombre" name="nombre"
                                    placeholder="Ej: Super Chocolate" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="sabor">Sabor</label>
                                <input class="form-control" type="text" id="sabor" name="sabor" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="tipo">Tipo</label>
                                <input class="form-control" type="text" id="tipo" name="tipo" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="precio">Precio</label>
                                    <input class="form-control" type="number" id="precio" name="precio" min="1"
                                        required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="unidades">Unidades Iniciales</label>
                                    <input class="form-control" type="number" id="unidades" name="unidades" min="1"
                                        required>
                                </div>
                            </div>

                            <div class="buttons mt-2">
                                <button type="submit" class="btn btn-secondary">Registrar Nuevo</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll('.menu-item[href]');
            const currentUrl = window.location.pathname;

            links.forEach(link => {
                if (link.getAttribute('href') === currentUrl) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>
    <script>
        // Espera 5 segundos y cierra las alertas si estan visibles
        setTimeout(function () {
            const alertList = document.querySelectorAll('.alert');
            alertList.forEach(function (alert) {
                let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>

</html>
