<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deshabilitar Helado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_EliminarHelado.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="main-container">
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>
        <div class="content-area">

            <!-- Mensaje de exito -->
            <div th:if="${mensaje}" class="alert alert-primary alert-dismissible fade show mt-3" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- Mensaje de error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- SECCION 1: Deshabilitar helado -->
            <div class="form-container">
                <form id="eliminarForm" action="/eliminarHelado" method="post">
                    <h2>Deshabilitar Helado</h2>

                    <select id="ubicacionSelect" name="ubicacion" class="form-select form-select-lg mb-3" required>
                        <option value="" selected>Elija la ubicacion</option>
                        <option value="almacen">Almacen</option>
                        <option value="heladeria">Heladeria</option>
                    </select>

                    <div id="tablaContainer" class="table-responsive" style="display: none;">
                        <table id="tablaHelados" class="table table-hover align-middle">
                            <thead class="table-primary">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Sabor</th>
                                    <th>Tipo</th>
                                    <th>Unidades</th>
                                    <th>Precio</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <input type="hidden" name="nombre" id="nombreHeladoSeleccionado">

                    <div class="modal-footer">
                        <button type="button" id="btnEliminar" class="btn btn-danger" disabled>Deshabilitar</button>
                    </div>
                </form>
            </div>

            <!-- SECCION 2: Helados Deshabilitados -->
            <div class="form-container mt-4">
                <h2>Helados Deshabilitados</h2>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Sabor</th>
                                <th>Tipo</th>
                                <th>Precio</th>
                                <th>Unidades</th>
                                <th>Ubicacion</th>
                                <th>Fecha Deshabilitacion</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(heladosDeshabilitados)}">
                                <td colspan="7" class="text-center text-muted">No hay helados deshabilitados.</td>
                            </tr>
                            <tr th:each="h : ${heladosDeshabilitados}">
                                <td th:text="${h.nombre}"></td>
                                <td th:text="${h.sabor}"></td>
                                <td th:text="${h.tipo}"></td>
                                <td th:text="'$' + ${h.precio}"></td>
                                <td th:text="${h.unidades}"></td>
                                <td th:text="${h.ubicacion}"></td>
                                <td th:text="${#temporals.format(h.fechaEliminacion, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#ubicacionSelect').on('change', function () {
                const ubicacion = $(this).val();
                $('#tablaContainer').hide();
                $('#tablaHelados tbody').empty();
                $('#btnEliminar').prop('disabled', true);
                $('#nombreHeladoSeleccionado').val('');

                if (ubicacion !== '') {
                    $.ajax({
                        url: '/obtenerHeladosPorUbicacion',
                        method: 'POST',
                        data: { ubicacion: ubicacion },
                        success: function (helados) {
                            if (helados.length > 0) {
                                helados.forEach(h => {
                                    $('#tablaHelados tbody').append(`
                                        <tr class="fila-helado" data-nombre="${h.nombre}">
                                            <td>${h.nombre}</td>
                                            <td>${h.sabor}</td>
                                            <td>${h.tipo}</td>
                                            <td>${h.unidades}</td>
                                            <td>$${h.precio}</td>
                                        </tr>
                                    `);
                                });
                                $('#tablaContainer').fadeIn();
                            } else {
                                $('#tablaHelados tbody').append('<tr><td colspan="5" class="text-center text-muted">No hay helados disponibles.</td></tr>');
                                $('#tablaContainer').fadeIn();
                            }
                        }
                    });
                }
            });

            $(document).on('click', '.fila-helado', function () {
                $('.fila-helado').removeClass('table-active');
                $(this).addClass('table-active');
                const nombre = $(this).data('nombre');
                $('#nombreHeladoSeleccionado').val(nombre);
                $('#btnEliminar').prop('disabled', false);
            });

            $('#btnEliminar').on('click', function (e) {
                e.preventDefault();
                const nombre = $('#nombreHeladoSeleccionado').val();
                const ubicacion = $('#ubicacionSelect').val();
                if (!nombre) return;

                Swal.fire({
                    title: '¿Estas seguro?',
                    text: `Vas a deshabilitar el helado "${nombre}" de ${ubicacion}.`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'Si, deshabilitar',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        $('#eliminarForm').off('submit').submit();
                    }
                });
            });
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll('.menu-item[href]');
            const currentUrl = window.location.pathname;
            links.forEach(link => {
                if (link.getAttribute('href') === currentUrl) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

    <script>
        setTimeout(function () {
            const alertList = document.querySelectorAll('.alert');
            alertList.forEach(function (alert) {
                let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>

</body>
</html>
