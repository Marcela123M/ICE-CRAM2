<!DOCTYPE html>
<html lang="en">
<head>
    <title>Eliminar Helado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_Eliminarhelado.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="background">
    <div class="box">
        <form action="/eliminarHelado" method="post">
            <h2>Eliminar Helado</h2>

            <select id="ubicacionSelect" name="ubicacion" class="form-select form-select-lg mb-3" required aria-label="Large select example">
                <option value="" selected>Elija la ubicacion</option>
                <option value="almacen">Almacen</option>
                <option value="heladeria">Heladeria</option>
            </select>

            <select id="heladoSelect" name="nombre" class="form-select form-select-lg mb-3" required aria-label="Large select example"
                    disabled>
                <option value="" selected>Elija un Helado</option>
            </select>
            <div class="modal-footer">
                <div id="error" th:if="${error}" class="alert alert-danger" role="alert">
                    <p th:text="${error}"></p>
                </div>
                <button onclick="window.location.href='/home'" type="button" class="btn btn-secondary">Regresar</button>
                <button type="submit" class="btn btn-primary">Eliminar</button>
            </div>
        </form>
    </div>
</div>
<script>
    $(document).ready(function () {
        // Cuando se selecciona la ubicación, se obtienen los helados
        $('#ubicacionSelect').on('change', function () {
            let ubicacion = $(this).val();
            if (ubicacion !== 'Elija la ubicación') {
                $.ajax({
                    url: '/obtenerHeladosPorUbicacion',
                    method: 'POST',
                    data: {ubicacion: ubicacion},
                    success: function (helados) {
                        $('#heladoSelect').prop('disabled', false);
                        $('#heladoSelect').empty().append('<option value="" selected>Elija un Helado</option>');
                        helados.forEach(function (helado) {
                            $('#heladoSelect').append(new Option(helado.nombre, helado.nombre));
                        });
                    }
                });
            } else {
                $('#heladoSelect').prop('disabled', true);
                $('#heladoSelect').empty().append('<option selected>Elija un Helado</option>');
            }
        });

    });
</script>
</body>
</html>
