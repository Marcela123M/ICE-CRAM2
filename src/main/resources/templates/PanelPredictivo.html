<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Inteligencia Artificial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <style>
        .card-header-ia { font-weight: bold; text-transform: uppercase; }
        .bg-j48 { background-color: #e3f2fd; color: #0d47a1; }
        .bg-m5p { background-color: #e8f5e9; color: #1b5e20; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <div class="content-area">
            <div class="content-header mb-4">
                <h1><i class="bi bi-robot"></i> Centro de Predicciones</h1>
                <p>Utiliza nuestros modelos de Machine Learning para tomar decisiones.</p>
            </div>

            <div class="container-fluid">
                <div class="row g-4">
                    
                    <div class="col-lg-6">
                        <div class="card h-100 shadow-sm">
                            <div class="card-header card-header-ia bg-j48">
                                 Predecir Preferencia (Sabor)
                            </div>
                            <div class="card-body">
                                <p class="small text-muted">Introduce los datos del cliente y la venta para adivinar que sabor querra.</p>
                                <form id="formSabor">
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <label>Tipo</label>
                                            <select name="tipo" class="form-select form-select-sm" required>
                                                <option value="paleta">Paleta</option>
                                                <option value="vaso">Vaso</option>
                                                <option value="cono">Cono</option>
                                                <option value="galleta">Galleta</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label>Precio ($)</label>
                                            <input type="number" step="0.01" name="precioUnitario" class="form-control form-control-sm" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label>Cantidad</label>
                                            <input type="number" name="cantidad" class="form-control form-control-sm" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label>Edad Cliente</label>
                                            <input type="number" name="edadCliente" class="form-control form-control-sm" required>
                                        </div>
                                        <div class="col-12">
                                            <label>Metodo Pago</label>
                                            <select name="metodoPago" class="form-select form-select-sm" required>
                                                <option value="efectivo">Efectivo</option>
                                                <option value="tarjeta">Tarjeta</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 mt-3">Predecir Sabor</button>
                                </form>
                                <div id="resultadoSabor" class="alert mt-3 d-none text-center fw-bold"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card h-100 shadow-sm">
                            <div class="card-header card-header-ia bg-m5p">
                                 Estimar Precio Ideal
                            </div>
                            <div class="card-body">
                                <p class="small text-muted">Selecciona el producto y el modelo calculara el precio ideal.</p>
                                <form id="formPrecio">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <label>Sabor</label>
                                            <select name="sabor" class="form-select" required>
                                                <option value="mango">Mango</option>
                                                <option value="vainilla">Vainilla</option>
                                                <option value="chocolate">Chocolate</option>
                                                <option value="fresa">Fresa</option>
                                                <option value="coco">Coco</option>
                                                <option value="maracuya">Maracuya</option>
                                                <option value="menta">Menta</option>
                                                <option value="mora">Mora</option>
                                                <option value="cafe">Cafe</option>
                                                <option value="caramelo">Caramelo</option>
                                                <option value="limon">Limon</option>
                                                <option value="nutella">Nutella</option>
                                                <option value="durazno">Durazno</option>
                                                </select>
                                        </div>
                                        <div class="col-12">
                                            <label>Tipo</label>
                                            <select name="tipo" class="form-select" required>
                                                <option value="paleta">Paleta</option>
                                                <option value="vaso">Vaso</option>
                                                <option value="cono">Cono</option>
                                                <option value="galleta">Galleta</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 mt-3">Calcular Precio</button>
                                </form>
                                <div id="resultadoPrecio" class="alert mt-3 d-none text-center fw-bold"></div>
                            </div>
                        </div>
                    </div>

                </div> </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // --- Logica para el Formulario IZQUIERDO (Sabor / J48) ---
        document.getElementById("formSabor").addEventListener("submit", async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            const alertBox = document.getElementById("resultadoSabor");
            alertBox.className = "alert mt-3 alert-info text-center fw-bold"; // Reset clases
            alertBox.textContent = "Pensando...";
            alertBox.classList.remove("d-none");

            try {
                const response = await fetch("/predecirSabor", { method: "POST", body: formData });
                const texto = await response.text();
                alertBox.textContent = texto;
                alertBox.classList.add(texto.includes("Error") ? "alert-danger" : "alert-primary");
            } catch (err) {
                alertBox.textContent = "Error de conexion";
                alertBox.classList.add("alert-danger");
            }
        });

        // --- Logica para el Formulario DERECHO (Precio / M5P) ---
        document.getElementById("formPrecio").addEventListener("submit", async function(e) {
            e.preventDefault();
            const formData = new FormData(this);

            const alertBox = document.getElementById("resultadoPrecio");
            alertBox.className = "alert mt-3 alert-warning text-center fw-bold"; // Reset clases
            alertBox.textContent = "Calculando...";
            alertBox.classList.remove("d-none");

            try {
                const response = await fetch("/predecirPrecio", { method: "POST", body: formData });
                const texto = await response.text();
                alertBox.textContent = texto;
                alertBox.classList.add(texto.includes("Error") ? "alert-danger" : "alert-success");
            } catch (err) {
                alertBox.textContent = "Error de conexion";
                alertBox.classList.add("alert-danger");
            }
        });
    </script>
</body>
</html>
