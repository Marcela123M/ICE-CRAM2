<!DOCTYPE html>
<html lang="en">

<head>
    <title>Ultimas Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/CSS_Ventas.css">
</head>

<body>
    <div class="background">
        <div class="box">
            <h2 class="mb-4 text-center">Ultimas Ventas Registradas</h2>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Vendedor</th>
                            <th>Cliente</th>
                            <th>Método de Pago</th>
                            <th>Total</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="venta : ${ventasPage.content}">
                            <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${venta.vendedor}"></td>
                            <td th:text="${venta.cliente.nombre}"></td>
                            <td th:text="${venta.metodoPago}"></td>
                            <td th:text="${venta.total}"></td>
                            <td>
                                <ul>
                                    <li th:each="item : ${venta.helados}">
                                        <span th:text="${item.helado.nombre}"></span> -
                                        <span th:text="${item.cantidad}"></span> und. -
                                        $<span th:text="${item.subTotal}"></span>
                                    </li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-end mt-3">
                <!-- Botón Anterior -->
                <button th:if="${currentPage > 0}"
                    th:onclick="'window.location.href=\'/registroVentas?page=' + (${currentPage} - 1) + '\''"
                    class="btn btn-primary" id="boton-anterior">
                    Página anterior
                </button>

                <!-- Botón Siguiente -->
                <button th:if="${currentPage + 1 < totalPages}"
                    th:onclick="'window.location.href=\'/registroVentas?page=' + (${currentPage} + 1) + '\''"
                    class="btn btn-primary">
                    Página siguiente
                </button>

                <button onclick="window.location.href='/home'" class="btn btn-secondary ms-2">Regresar</button>
            </div>
        </div>
    </div>
</body>

</html>
