<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ultimas Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_Ventas.css">
</head>

<body>
    <div class="main-container">
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <div class="content-area">
            <div class="modal-footer">
                <button onclick="confirmarRegreso()" class="btn btn-secondary ms-2">Regresar</button>
            </div>

            <h2 class="mb-4 text-center">ultimas Ventas Registradas</h2>

            <form class="row g-2 mb-4" method="get" action="/registroVentas">
                <div class="col-md-3">
                    <input type="date" class="form-control" name="fechaDesde" placeholder="Desde">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="fechaHasta" placeholder="Hasta">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                </div>
                <div class="col-auto">
                    <a href="/registroVentas" class="btn btn-primary">Limpiar</a>
                </div>
            </form>

            <!--Info de resultados -->
            <p class="text-white">
                Mostrando
                <span th:text="${ventasPage.number * ventasPage.size + 1}">1</span> -
                <span th:text="${ventasPage.number * ventasPage.size + ventasPage.numberOfElements}">10</span>
                de <span th:text="${ventasPage.totalElements}">0</span> ventas.
            </p>

            <!--Tabla de ventas -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Vendedor</th>
                            <th>Cliente</th>
                            <th>Metodo de Pago</th>
                            <th>Total</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filas de ventas -->
                        <tr th:each="venta : ${ventasPage.content}">
                            <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${venta.vendedor}"></td>
                            <td th:text="${venta.cliente.nombre}"></td>
                            <td th:text="${venta.metodoPago}"></td>
                            <td th:text="${venta.total}"></td>
                            <td>
                                <ul>
                                    <li th:each="item : ${venta.helados}">
                                        <span th:text="${item.helado.nombre}"></span> -
                                        <span th:text="${item.cantidad}"></span> und. -
                                        $<span th:text="${item.subTotal}"></span>
                                    </li>
                                </ul>
                            </td>
                        </tr>

                        <tr th:if="${ventasPage.totalElements == 0}">
                            <td colspan="6" class="text-center text-muted">No se encontraron ventas para este criterio.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Paginacion numerica -->
            <div class="pagination-wrapper mt-4 d-flex justify-content-center">
                <nav aria-label="Paginacion" class="mt-4 d-flex justify-content-center">
                    <ul class="pagination">
                        <th:block
                            th:with="blockSize=6,
                                currentBlock=${currentPage / blockSize},
                                startPage=${currentBlock * blockSize},
                                endPage=${startPage + blockSize - 1 > totalPages - 1 ? totalPages - 1 : startPage + blockSize - 1}">

                            <!-- Flecha hacia atras por bloque -->
                            <li class="page-item" th:classappend="${startPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/registroVentas(page=${startPage - blockSize})}">«</a>
                            </li>

                            <!-- Numeros de pagina -->
                            <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/registroVentas(page=${i})}" th:text="${i + 1}">1</a>
                            </li>

                            <!-- Flecha hacia adelante -->
                            <li class="page-item" th:classappend="${endPage >= totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/registroVentas(page=${startPage + blockSize})}">»</a>
                            </li>
                        </th:block>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script>
        function confirmarRegreso() {
            window.location.href = '/reporteOpciones';
        }

        document.addEventListener("DOMContentLoaded", function () {
            const currentUrl = window.location.pathname;
            const linkMappings = {
                '/reporteOpciones': [
                    '/reporteOpciones',
                    '/heladosAlmacen',
                    '/heladosHeladeria',
                    '/registroVentas',
                    '/reporte'
                ],
                '/home': ['/home'],
                '/agregarAlAlmacen': ['/agregarAlAlmacen'],
                '/moverHelado': ['/moverHelado'],
                '/editarHelado': ['/editarHelado'],
                '/eliminarHelado': ['/eliminarHelado'],
            };

            const links = document.querySelectorAll('.menu-item[href]');
            links.forEach(link => {
                const href = link.getAttribute('href');
                const validPaths = linkMappings[href] || [];
                if (validPaths.some(path => currentUrl.startsWith(path))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

</body>

</html>
