<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Helados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
    <link rel="stylesheet" href="/css/CSS_Reporte.css">
</head>

<body>
    <div class="main-container">
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <div class="content-area">
            <div class="modal-footer" style="padding-right: 10px;">
                <button onclick="window.location.href='/reporteOpciones'" type="button"
                    class="btn btn-secondary">Regresar</button>
            </div>
            <iframe title="IceCreamPB" width="1200" height="600"
                src="https://app.powerbi.com/view?r=eyJrIjoiOTQyOGY4ODQtYTM4Ny00NWFmLWFiNmQtNDlkYWVjYWFlMGFkIiwidCI6IjlkMTJiZjNmLWU0ZjYtNDdhYi05MTJmLTFhMmYwZmM0OGFhNCIsImMiOjR9"
                frameborder="0" allowFullScreen="true">
            </iframe>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentUrl = window.location.pathname;
            const linkMappings = {
                '/reporteOpciones': [
                    '/reporteOpciones',
                    '/heladosAlmacen',
                    '/heladosHeladeria',
                    '/registroVentas',
                    '/reporte'
                ],
                '/home': ['/home'],
                '/agregarAlAlmacen': ['/agregarAlAlmacen'],
                '/moverHelado': ['/moverHelado'],
                '/editarHelado': ['/editarHelado'],
                '/eliminarHelado': ['/eliminarHelado'],
            };

            const links = document.querySelectorAll('.menu-item[href]');

            links.forEach(link => {
                const href = link.getAttribute('href');
                const validPaths = linkMappings[href] || [];

                if (validPaths.some(path => currentUrl.startsWith(path))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

</body>

</html>
