<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Sabor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/styleHome.css">
</head>

<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div th:replace="sidebar :: sidebar"></div>
        </div>

        <!-- Contenido principal -->
        <div class="content-area">
            <div class="content-header">
                <h1>Predicción de Sabor</h1>
                <p>Introduce los datos y el modelo predecirá el sabor del helado</p>
            </div>

            <div class="container mt-4">
                <form action="/predecirSabor" method="post" id="formPrediccion" class="shadow p-4 bg-white rounded">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="tipo" class="form-label">Tipo de helado</label>
                            <input type="text" class="form-control" id="tipo" name="tipo" required>
                        </div>

                        <div class="col-md-6">
                            <label for="precioUnitario" class="form-label">Precio unitario</label>
                            <input type="number" step="0.01" class="form-control" id="precioUnitario"
                                name="precioUnitario" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cantidad" class="form-label">Cantidad</label>
                            <input type="number" step="1" class="form-control" id="cantidad" name="cantidad" required>
                        </div>

                        <div class="col-md-6">
                            <label for="edadCliente" class="form-label">Edad del cliente</label>
                            <input type="number" step="1" class="form-control" id="edadCliente" name="edadCliente"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label for="metodoPago" class="form-label">Método de pago</label>
                            <select id="metodoPago" name="metodoPago" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option value="efectivo">Efectivo</option>
                                <option value="tarjeta">Tarjeta</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary">Predecir Sabor</button>
                    </div>
                </form>

                <div id="resultado" class="alert mt-4 d-none"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("formPrediccion").addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const response = await fetch("/predecirSabor", {
                method: "POST",
                body: formData
            });
            const resultado = await response.text();

            const alertBox = document.getElementById("resultado");
            alertBox.textContent = resultado;
            alertBox.classList.remove("d-none", "alert-danger");
            alertBox.classList.add("alert-success");
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll('.menu-item[href]');
            const currentUrl = window.location.pathname;

            links.forEach(link => {
                if (link.getAttribute('href') === currentUrl) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>
</body>

</html>
