spring.application.name=IceCream-SpringBoot
server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Bases de datos en la nube
# Configuracion de MySQL (Azure Flexible Server)
spring.datasource.url=${SPRING_DATA_MYSQL_URI}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Configuracion de MongoDB (Atlas)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuración de Groq (usando el starter de OpenAI)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=meta-llama/llama-4-scout-17b-16e-instruct
spring.ai.openai.chat.options.max-tokens=2000
# Configuración MCP
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers-filesystem-docker.json