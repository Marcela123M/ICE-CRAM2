services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: DB_IceCream
      MYSQL_ROOT_PASSWORD: Oso17
    ports:
      - "3308:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

  mongo:
    image: mongo:latest
    container_name: mongo_db
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_DATABASE: heladeria_db
    

  app:
    build: .
    container_name: icecream_app
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      # Estas variables permiten parametrizar la configuración
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: DB_IceCream
      MYSQL_USER: root
      MYSQL_PASSWORD: Oso17

      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: heladeria_db

volumes:
  mysql_data:
  mongo_data:
